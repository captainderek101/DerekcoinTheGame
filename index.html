<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>$DEREK To The Moon!</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="fxLayer" class="fx-layer" aria-hidden="true"></div>
  <div id="welcomeOverlay" class="welcome-overlay welcome-overlay--hidden" role="dialog" aria-modal="true" aria-labelledby="welcomeTitle">
    <div class="welcome-modal">
      <button id="welcomeCloseButton" class="welcome-close" type="button" aria-label="Close welcome message">x</button>
      <h2 id="welcomeTitle" class="welcome-title">Welcome, investor!</h2>
      <p id="welcomeDescription" class="welcome-description">Click the Derekcoin to mine $DEREK. Start mining now!</p>
    </div>
  </div>
  <main class="game">
    <section class="left-panel">
      <h1>$DEREK To The Moon!</h1>
      <div id="counter" class="counter">Market value: $0.00</div>

      <button id="clickButton" class="coin-button" aria-label="Mine Derekcoin">
        <span class="coin-rock-wrap">
          <img class="coin-svg no-select" draggable="false" src="images/derekcoin.svg" alt="Derekcoin button graphic">
        </span>
      </button>

      <div class="achievements-section">
        <div id="achievementToast" class="achievement-toast" role="status" aria-live="polite" aria-atomic="true"></div>
        <div class="achievements-row" id="achievementsRow"></div>
      </div>

      <div class="hint">Click the coin to pump Derekcoin.</div>
      <div class="hint" id="rateText">Growth rate: $0.00/sec</div>
    </section>

    <aside class="right-panel">
      <div class="assets-title">Financial Assets</div>
      <div class="assets-scroll" id="assetsScroll"></div>
      <div id="status" class="status"></div>
    </aside>
  </main>

  <script src="script.js"></script>
</body>
</html>
